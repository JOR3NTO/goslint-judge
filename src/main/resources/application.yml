app:
    jwt:
        expiration-ms: 86400000
        secret: change-this-secret-key-to-a-long-random-string
spring:
    application:
        name: goslint-judge
    datasource:
        password: ${DB_PASSWORD}
        url: ${DB_HOST}
        username: ${DB_USER}
    jpa:
        hibernate:
            ddl-auto: create-drop
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: true